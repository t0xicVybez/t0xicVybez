<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 228" width="680" height="228">
<style>text{font-family:'Courier New',Courier,monospace;font-size:13px}</style>
<defs>
  <!-- Each clipPath reveals its line left-to-right as width grows from 0 -->
  <clipPath id="c1"><rect x="20" y="50" height="18"><animate attributeName="width" from="0" to="150" dur="0.6s" begin="0.4s" fill="freeze"/></rect></clipPath>
  <clipPath id="c3"><rect x="20" y="86" height="18"><animate attributeName="width" from="0" to="565" dur="2.72s" begin="1.4s" fill="freeze"/></rect></clipPath>
  <clipPath id="c4"><rect x="20" y="104" height="18"><animate attributeName="width" from="0" to="558" dur="2.68s" begin="4.12s" fill="freeze"/></rect></clipPath>
  <clipPath id="c5"><rect x="20" y="122" height="18"><animate attributeName="width" from="0" to="510" dur="2.48s" begin="6.8s" fill="freeze"/></rect></clipPath>
  <clipPath id="c7"><rect x="20" y="158" height="18"><animate attributeName="width" from="0" to="240" dur="1.04s" begin="9.78s" fill="freeze"/></rect></clipPath>
  <clipPath id="c8"><rect x="20" y="176" height="18"><animate attributeName="width" from="0" to="460" dur="2.2s" begin="10.88s" fill="freeze"/></rect></clipPath>
  <clipPath id="c9"><rect x="20" y="194" height="18"><animate attributeName="width" from="0" to="368" dur="1.72s" begin="13.08s" fill="freeze"/></rect></clipPath>
</defs>

<!-- Outer frame -->
<rect width="680" height="228" rx="8" fill="#0d1117"/>
<rect width="680" height="228" rx="8" fill="none" stroke="#21262d" stroke-width="1"/>

<!-- Title bar -->
<rect width="680" height="36" rx="8" fill="#161b22"/>
<rect y="28" width="680" height="8" fill="#161b22"/>
<circle cx="18" cy="18" r="5" fill="#ff5f57"/>
<circle cx="34" cy="18" r="5" fill="#ffbd2e"/>
<circle cx="50" cy="18" r="5" fill="#28c941"/>
<text x="340" y="23" fill="#484f58" text-anchor="middle" font-size="12">bash — about.txt</text>

<!-- Line 1: command -->
<text x="20" y="63" fill="#39d353" clip-path="url(#c1)">$ cat about.txt</text>

<!-- Bio lines -->
<text x="20" y="99"  fill="#8b949e" clip-path="url(#c3)">  Hobbyist dev. I build Discord bots, automation tools, and whatever</text>
<text x="20" y="117" fill="#8b949e" clip-path="url(#c4)">  else catches my interest. I don't wait until things are perfect —</text>
<text x="20" y="135" fill="#8b949e" clip-path="url(#c5)">  I ship, iterate, and learn. Usually found coding at midnight.</text>

<!-- Metadata lines (gray label + blue value, clipped as a group) -->
<g clip-path="url(#c7)">
  <text x="20"  y="171" fill="#8b949e">  Location  →  </text>
  <text x="137" y="171" fill="#58a6ff">California</text>
</g>
<g clip-path="url(#c8)">
  <text x="20"  y="189" fill="#8b949e">  Focus     →  </text>
  <text x="137" y="189" fill="#58a6ff">Discord bots · Automation · Web projects</text>
</g>
<g clip-path="url(#c9)">
  <text x="20"  y="207" fill="#8b949e">  Currently →  </text>
  <text x="137" y="207" fill="#58a6ff">Actively developing ArkenBot</text>
</g>

<!-- Blinking cursor — hidden until typing finishes, then blinks -->
<rect x="357" y="195" width="8" height="12" fill="#39d353" opacity="0">
  <animate attributeName="opacity" values="1;0" calcMode="discrete" keyTimes="0;0.5" dur="1s" begin="14.8s" repeatCount="indefinite"/>
</rect>

</svg>
